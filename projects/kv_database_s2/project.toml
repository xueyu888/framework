# Config 主层唯一入口。
# 这份配置把 `framework/LV_Database_S2/L0-M0-KV_Database_S2.md` 的结构空间，
# 具体化成：
# 1. communication：面向人与 AI 协作时讨论边界的结构化要求
# 2. exact：面向 Code 层精确消费的字段、参数与路径
#
# 当前项目是 KV Database S2 的最小实现草案：
# 以内存 KV 内核为主，补齐 WAL、checkpoint/snapshot 与恢复链。

[project]
project_id = "kv_database_s2"
runtime_scene = "kv_database_memory_wal_snapshot"
display_name = "KV Database S2"
description = "A minimal in-memory KV database with WAL, checkpoint snapshots, and snapshot-then-WAL recovery."
version = "0.1.0"

[framework]
# 当前项目只装配一个 root framework 模块：
# LV_Database_S2.L0.M0
#
# 该模块当前可解析出的 boundary_id 为：
# COUNT / OPERATION / KEY / VALUE / LOGPATH / LOG / SNAPSHOTPATH / SNAPSHOT / RECORDTIMING / RECOVER
#
# 对应 projection 已由 framework 导出固定为一对一：
# communication.LV_Database_S2.<boundary_lower>
# exact.LV_Database_S2.<boundary_lower>

[[framework.modules]]
role = "kv_database"
framework_file = "framework/LV_Database_S2/L0-M0-KV_Database_S2.md"

[communication.LV_Database_S2.count]
intent = "bounded in-memory store"
discussion_focus = "keep the kernel simple and explicit about capacity behavior"

[communication.LV_Database_S2.operation]
intent = "put get delete only"
discussion_focus = "write path, read path, and delete semantics must stay explicit"

[communication.LV_Database_S2.key]
intent = "single string key per operation"
discussion_focus = "key domain stays string-only and maps to exactly one value"

[communication.LV_Database_S2.value]
intent = "put requires a value payload"
discussion_focus = "serialization and nullability stay explicit for WAL and snapshot"

[communication.LV_Database_S2.logpath]
intent = "WAL path and filename must be explicit"
discussion_focus = "keep append-only log location stable and visible"

[communication.LV_Database_S2.log]
intent = "WAL keeps operation key value ordering"
discussion_focus = "line shape and replay policy must stay explicit"

[communication.LV_Database_S2.snapshotpath]
intent = "snapshot file path and filename must be explicit"
discussion_focus = "checkpoint artifact location must remain stable and inspectable"

[communication.LV_Database_S2.snapshot]
intent = "snapshot stores full current state"
discussion_focus = "snapshot format and WAL compaction rule must stay explicit"

[communication.LV_Database_S2.recordtiming]
intent = "checkpoint happens on a fixed write cadence"
discussion_focus = "keep checkpoint trigger simple and deterministic"

[communication.LV_Database_S2.recover]
intent = "recover from snapshot then replay WAL"
discussion_focus = "recovery ordering must stay explicit and testable"

[exact.LV_Database_S2.count]
max_items = 10000
overflow_policy = "raise_limit_error"

[exact.LV_Database_S2.operation]
allowed_operations = ["put", "get", "delete"]
write_operations = ["put", "delete"]
read_operation = "get"
missing_key_policy = "raise_key_error"

[exact.LV_Database_S2.key]
python_type = "str"
empty_key_allowed = false
normalization = "identity"

[exact.LV_Database_S2.value]
python_type = "Any"
serialization = "repr"
nullable = false

[exact.LV_Database_S2.logpath]
wal_directory = "runtime_data/kv_database_s2"
wal_filename = "wal.log"
create_parent_on_boot = true

[exact.LV_Database_S2.log]
record_format = "json_lines"
field_order = ["operation", "key", "value_repr"]
line_delimiter = "\\n"
replay_strategy = "snapshot_then_wal_replay"

[exact.LV_Database_S2.snapshotpath]
snapshot_directory = "runtime_data/kv_database_s2"
snapshot_filename = "checkpoint.snapshot"
create_parent_on_boot = true

[exact.LV_Database_S2.snapshot]
record_format = "json_lines_key_value_map"
line_delimiter = "\\n"
compact_wal_on_checkpoint = true

[exact.LV_Database_S2.recordtiming]
trigger = "every_n_writes"
every_write_operations = 100

[exact.LV_Database_S2.recover]
strategy = "snapshot_then_wal_replay"

[exact.evidence.artifacts]
canonical_json = "canonical.json"
