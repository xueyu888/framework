# Implementation Config 只回答一件事：在不改写产品真相的前提下，
# 这个仓库准备如何把 product_spec.toml 中已经确定的产品落到一条具体实现路径上。
# 它可以选择技术栈、运行时、生成目标和证据出口，
# 但不能反过来改变产品页面、产品交互、视觉语义或内容语义。
#
# 这个文件同样默认面向人与 AI 协作阅读，因此注释优先说明：
# 1. 当前 section 细化的是哪一类实现决策；
# 2. 这些实现决策如何服务既定的 Product Spec；
# 3. 哪些东西明确不应由这一层擅自改写。

# [frontend] 细化前端实现路径。
# 它只决定“用哪种前端渲染器、样式配置和浏览器侧脚本方案去实现产品”，
# 不重新定义产品外观语义，也不改写用户应看到哪些页面和承载面。
[frontend]
renderer = "knowledge_chat_client_v1"
style_profile = "knowledge_chat_web_v1"
script_profile = "knowledge_chat_browser_v1"

# [backend] 细化后端承载方式。
# 它决定接口由哪类后端 renderer 暴露、采用什么传输协议、检索走哪种实现策略，
# 但不能更改 Product Spec 已承诺的接口语义、来源回路或知识对象能力。
[backend]
renderer = "knowledge_chat_backend_v1"
transport = "http_json"
retrieval_strategy = "retrieval_stub"

# [evidence] 约定实现层如何暴露验证与审查入口。
# 这些字段服务于调试、验证和自动化消费，不属于产品真相本身。
[evidence]
product_spec_endpoint = "/api/knowledge/product-spec"

# [artifacts] 约定本实现路径会产出哪些生成文件。
# 这里记录的是生成物命名与落点，方便代码、脚本和工具协作，
# 不应被误当作产品层字段。
[artifacts]
framework_ir_json = "framework_ir.json"
product_spec_json = "product_spec.json"
implementation_bundle_py = "implementation_bundle.py"
generation_manifest_json = "generation_manifest.json"
governance_manifest_json = "governance_manifest.json"
governance_tree_json = "governance_tree.json"
strict_zone_report_json = "strict_zone_report.json"
object_coverage_report_json = "object_coverage_report.json"
