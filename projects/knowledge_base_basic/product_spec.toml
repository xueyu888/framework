# Product Spec 只回答一件事：这个产品最终应该是什么。
# 这个入口文件保留项目身份和框架来源；其余产品边界 section 拆到同级 `product_spec/*.toml`，
# 让边界 token 可以点对点跳到对应 section 文件，同时保留一个固定的讨论入口。

[project]
project_id = "knowledge_base_basic"
template = "knowledge_base_workbench"
display_name = "Shelf AI Knowledge Chat"
description = "A ChatGPT-style knowledge chat client compiled from Shelf framework standards and one product spec."
version = "0.3.0"

[framework]
frontend = "framework/frontend/L2-M0-前端框架标准模块.md"
domain = "framework/knowledge_base/L2-M0-知识库工作台场景模块.md"
backend = "framework/backend/L2-M0-知识库接口框架标准模块.md"
preset = "document_chat_workbench"
