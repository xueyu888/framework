[communication.Chunk_Tagging.l2_m0.p4]
summary = "根据文档ID查询得到的文本块集合中的每个文本块都必须满足 `backend.L0.M0[R3]` 的组合规则"

[communication.Chunk_Tagging.l2_m0.p5]
summary = "当前文档对应的文本块数量必须大于等于 `1`"

[communication.Chunk_Tagging.l2_m0.p6]
summary = "根据文档领域查询得到的标签定义集合中的每个标签定义都必须满足 `L0.M0[R1]` 的组合规则"

[communication.Chunk_Tagging.l2_m0.p7]
