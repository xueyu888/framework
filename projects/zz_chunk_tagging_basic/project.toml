[communication.Chunk_Tagging.l2_m2.p7]
summary = "人工最终结论只能为 `启用` 或 `不启用`，不得继续写回 `待人工审核`"

[communication.Chunk_Tagging.l2_m2.p8]
summary = "写回数据库后的记录必须更新 `enable_status`、`review_status` 和 `review_source` 字段，其中 `review_status = 已审核`"

