[communication.Chunk_Tagging.l1_m1.p8]
summary = "单次写入的标注记录数量等于 `1`"

[communication.Chunk_Tagging.l1_m1.p9]
summary = "导出的人工审核数据必须至少包含 `doc_id`、`chunk_id`、`tag_name`、`confidence`、`reason`、`enable_status`、`review_status` 与对应文本块内容"

[communication.Chunk_Tagging.l1_m1.p10]
summary = "每条标注记录都必须能通过 `doc_id + chunk_id` 关联到唯一文本块内容，且该文本块内容必须满足 `backend.L0.M0[R3]` 的组合规则"

[communication.Chunk_Tagging.l1_m1.p11]
summary = "写回输入必须至少包含记录定位字段、`enable_status`、`review_status` 与 `review_source` 字段"

[communication.Chunk_Tagging.l1_m1.p12]
summary = "写回结果中的 `enable_status` 只能为 `启用`、`不启用` 或 `待人工审核`；`review_status` 只能为 `已审核` 或 `未审核`"

[communication.Chunk_Tagging.l1_m1.p13]
summary = "状态写回必须作用于 `enable_status`、`review_status` 和 `review_source` 字段"

[communication.Chunk_Tagging.l1_m1.p14]
summary = "单次状态写回必须作用于单个文档下的一条或多条已有标注记录"

[communication.Chunk_Tagging.l1_m1.p15]
summary = "数据库类型固定为 postgres"

[communication.Chunk_Tagging.l1_m2.p1]
summary = "字符串类型"

[communication.Chunk_Tagging.l1_m2.p2]
