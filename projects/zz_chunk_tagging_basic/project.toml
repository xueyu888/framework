[communication.Chunk_Tagging.l1_m1.p5]
summary = "查询得到的标注记录必须属于单个文档ID下的已有标注记录，且至少包含 `doc_id`、`chunk_id`、`tag_name`、`confidence`、`reason`、`review_status` 与 `enable_status` 字段"

[communication.Chunk_Tagging.l1_m1.p6]
