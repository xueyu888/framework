# 项目配置（Config 层唯一入口）
#
# 目标：
# 1) 将 Chunk_Tagging framework 物化为可追溯的 Config/Code/Evidence 链路。
# 2) 对重复的 `P*` 边界采用模块级 section：`communication/exact.Chunk_Tagging.lx_my.pn`。
# 3) 用中文注释保留人与 AI 协作入口；Code 仍只消费 exact。
#
# 注意：
# - framework/*.md 仍是作者源；本文件只实例化当前项目。
# - generated/canonical.json 由物化流程生成，禁止手工改写 generated 目录。

[project]
project_id = "chunk_tagging_basic"
runtime_scene = "chunk_tagging"
display_name = "Chunk Tagging 基础样例"
description = "围绕 Chunk_Tagging 框架的评分、系统判定与人工审核闭环配置。"
version = "0.1.0"

[framework]
# 这里选择审核闭环 root module，并额外挂上记录结构模块；其余同 framework upstream 自动收敛。

[[framework.modules]]
role = "review_flow"
framework_file = "framework/Chunk_Tagging/L3-M0-标注审核模块.md"

[[framework.modules]]
role = "chunk_tag_record"
framework_file = "framework/Chunk_Tagging/L1-M2-文本-标签评分记录.md"

# communication 负责人与 AI 的结构化沟通要求。
# 对 Chunk_Tagging，由于多个模块重复使用 P1/P2...，这里按 module scope 分组讨论。
