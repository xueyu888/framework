[communication.Chunk_Tagging.l3_m0.p5]
summary = "人工审核只作用于 `enable_status = 待人工审核` 且 `review_status = 未审核` 的记录"

[communication.Chunk_Tagging.l3_m0.p6]
summary = "完整流转结束后，每条标注记录都必须落到合法的 `enable_status`、`review_status` 与 `review_source` 状态组合"

