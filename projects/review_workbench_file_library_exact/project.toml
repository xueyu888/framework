# Config 层唯一入口。
# 这个项目不是在现有 review_workbench 基础示例上做兼容扩展，
# 而是单独开一个“文件仓库页 1:1 对齐参考实例”，用于证明：
# 1. 统一审核平台仍走四层主链；
# 2. file_library_processing 场景可以按产品截图精确实例化；
# 3. submission_review 作为当前运行时与 validator 需要的配套场景保留，
#    但本项目重点仍是文件仓库页的 1:1 结构映射。
#
# 约束：
# 1. framework 只声明选中的 framework 模块；
# 2. communication 只承载人与 AI 的结构化沟通要求；
# 3. exact 只承载 Code 层精确消费字段；
# 4. generated/* 一律通过 materialize 生成。

[project]
project_id = "review_workbench_file_library_exact"
runtime_scene = "review_workbench_multi_scene"
display_name = "Review Workbench File Library Exact"
description = "A review_workbench project focused on 1:1 file-library materialization while keeping the unified platform and the paired submission-review scene valid under the four-layer architecture."
version = "0.1.0"

[framework]

[[framework.modules]]
role = "frontend"
framework_file = "framework/frontend/L3-M0-前端框架标准模块.md"

[[framework.modules]]
role = "review_workbench"
framework_file = "framework/review_workbench/L3-M0-统一审查平台场景模块.md"

[[framework.modules]]
role = "review_workbench_backend"
framework_file = "framework/review_workbench_backend/L0-M0-统一审查平台后端契约总纲原子模块.md"

[communication.frontend.surface]
product_shape = "platform_sidebar_workspace_shell"
interaction_mode = "scene_first"
secondary_pages = []

[communication.frontend.visual]
brand_direction = "light operational exact"
accent_strategy = "single blue accent"

[communication.frontend.interact]
action_policy = "scene switch, scope refresh, file-library tab activation, filter reset, and source trace stay explicit"
allow_mutation = ["upload", "create_folder", "rename", "move", "delete"]

[communication.frontend.state]
state_model = "loading empty ready feedback"
conversation_grouping = "not_applicable"

[communication.frontend.extend]
slot_policy = "domain_workbench and backend_contract only"
return_targets = ["workspace_header", "scene_feedback"]

[communication.frontend.route]
route_shape = "single workbench page"
deep_link_support = ["scene", "scope", "tab", "item"]

[communication.frontend.a11y]
keyboard_first = true
announcement_focus = "platform sidebar and file-library workspace"

[communication.review_workbench.platform]
platform_shape = "single platform shell hosting a file-library scene and a submission-review scene"
scene_policy = "file-library scene is the exact target scene while submission-review stays valid as paired platform scene"

[communication.review_workbench.file_library_processing]
range_model = "single current scope driving list, filter context, open tabs, empty state, and platform stats"
mutation_policy = "mutations must return to scope, query, feedback, and platform stats"

[communication.review_workbench.submission_review]
review_mode = "paired review scene kept for validator completeness"
feedback_policy = "review result must still flow back into queue, summary, or visible feedback"

[communication.review_workbench_backend.contract]
transport = "http_json"
contract_shape = "query processing_open mutation source_trace review_queue review_open review_submit review_feedback"

# exact 是 Code 层唯一精确消费源。
[exact.frontend.surface]
shell = "platform_sidebar_shell"
layout_variant = "review_workbench_file_library_exact"
sidebar_width = "md"
preview_mode = "inline"
density = "comfortable"
surface_regions = [
  { region_id = "platform_sidebar", title = "Platform Sidebar", boundary = "SURFACE" },
  { region_id = "scene_workspace", title = "Scene Workspace", boundary = "SURFACE" },
  { region_id = "scene_feedback", title = "Scene Feedback", boundary = "SURFACE" },
]

[exact.frontend.visual]
brand = "统一审核平台"
accent = "#2563eb"
surface_preset = "light"
radius_scale = "xl"
shadow_level = "md"
font_scale = "md"

[exact.frontend.interact]
platform_title = "统一审核平台"
scene_switch_label = "当前挂接场景"
current_scope_label = "范围"
workspace_title = "统一审核平台工作台"
refresh_label = "刷新目录"
open_processing_label = "打开文件工作页签"
view_source_label = "查看来源回看"

[exact.frontend.state]
empty_state_title = "暂无数据"
empty_state_copy = "当前查询条件下没有找到相关数据，请尝试调整筛选条件。"
loading_text = "文件仓库 1:1 配置已进入 runtime export。"
ready_text = "统一平台已承接文件仓库与审核提交两个场景，其中默认展示文件仓库。"

[exact.frontend.extend]
return_targets = ["workspace_header", "scene_feedback"]
conversation_list_variant = "not_applicable"

[exact.frontend.route]
home = "/"
workbench = "/review-workbench"
api_prefix = "/api/review-workbench"

[exact.frontend.a11y]
reading_order = ["platform_sidebar", "workspace_header", "scene_workspace", "scene_feedback"]
keyboard_nav = ["scene-switch", "refresh-scope", "open-processing", "open-source-trace"]
