# Product Spec 只描述这个分块产品最终应该做什么。
# 这里固定的是：输入是什么、如何分段、如何判定标题/正文、如何把段落块组合成文本块、
# 以及最终结果应按什么结构输出。
# 它不负责描述正则实现细节、FastAPI 挂载方式、CLI 命令入口或生成物文件名，
# 那些都属于 implementation_config.toml。

[project]
project_id = "document_chunking_basic"
template = "document_chunking_pipeline"
display_name = "Shelf Document Chunking"
description = "Compile one normalized markdown document into ordered paragraph blocks, text chunks, ownership records, and a stable output format."
version = "0.1.0"

# [framework] 记录本产品依附的框架来源。
# 当前项目是纯文档分块程序，没有独立前端/后端框架，因此三个位点统一指向
# document_chunking 的 L1 主模块，表示整个产品真相都收敛于同一条文档分块链路。
[framework]
frontend = "framework/document_chunking/L1-M0-文档分块.md"
domain = "framework/document_chunking/L1-M0-文档分块.md"
backend = "framework/document_chunking/L1-M0-文档分块.md"
preset = "markdown_heading_chunking"

# [input] 只描述程序对输入文档的产品层要求。
# 这里约束的是“程序面向怎样的文档对象”，而不是具体如何读文件。
[input]
accepted_document_kind = "single_markdown_document"
normalization = "newline_and_whitespace_normalized"
document_id_strategy = "file_stem"
document_name_source = "file_name"

# [segmentation] 固定段落块的分段真相。
# 也就是：什么构成一个段落块、块之间如何切开、块长度应落在哪个范围内。
[segmentation]
boundary_template = "blank_line_blocks"
boundary_signals = ["markdown_heading_line", "blank_line_gap"]
min_block_chars = 1
max_block_chars = 8000
allow_cross_document = false

# [role_judgment] 固定角色判型真相。
# 当前产品只允许两种角色：title / body。
[role_judgment]
title_rule = "markdown_heading_prefix"
body_rule = "non_heading_paragraph"
allowed_roles = ["title", "body"]

# [composition] 固定段落块如何组合成文本块。
# 这里直接承诺“一个标题 + 零个或多个连续正文”的结构。
[composition]
anchor_role = "title"
member_role = "body"
group_shape = "1_title_plus_zero_or_more_body"
closure = "next_title_or_end_of_document"
preserve_order = true

# [ownership] 固定归属关系表应记录什么。
# 表头、必填列和唯一归属都属于产品层承诺。
[ownership]
header = ["block_id", "text_chunk_id", "block_role", "position_in_chunk"]
required_columns = ["block_id", "text_chunk_id", "block_role", "position_in_chunk"]
unique_block_to_chunk = true

# [output] 固定最终输出格式。
# 当前输出核心是：一个 text_id，加上若干有序的 (chunk_id, chunk_text) 单元；
# 对外落盘时要求能够按 Markdown 文档形式承载，并保持字段顺序不变；
# 另外保留段落块、归属记录和 trace 元信息，保证回溯能力。
[output]
format_name = "text_chunk_output"
render_medium = "markdown_document"
chunk_item_layout = "chunk_id_then_chunk_text"
text_id_field = "text_id"
chunk_id_field = "chunk_id"
chunk_text_field = "chunk_text"
chunk_collection_field = "ordered_chunk_item_set"
include_paragraph_blocks = true
include_ownership_records = true
include_trace_meta = true

# [validation] 固定程序必须满足的结果校验承诺。
# 这里描述的是可观察的正确性要求，而不是测试框架怎么写。
[validation]
require_non_empty_blocks = true
require_unique_order_index = true
require_output_traceability = true
max_chunk_items = 2000
