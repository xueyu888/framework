# 仓库级机器策略。
# 这里承载的是 repo 治理与可移植性校验的单一真相源，
# 避免把同一批规则散落在 validate_strict_mapping.py 里重复硬编码。

[repo]
public_repo_slug = "xueyu888/shelf"

[validation]
default_level_order = ["L0", "L1", "L2", "L3"]
valid_node_kinds = ["layer", "file"]
required_l1_anchors_per_l2 = [
  "## 1. 能力声明（Capability Statement）",
  "## 2. 边界定义（Boundary）",
  "## 3. 最小可行基（Bases）",
  "## 4. 组合原则（Combination Principles）",
  "## 5. 验证（Verification）",
]
required_framework_directive_sections = [
  "## 1. 能力声明",
  "## 2. 边界定义",
  "## 3. 最小可行基",
  "## 4. 基组合原则",
  "## 5. 验证",
]
allowed_project_top_level_dirs = ["assets", "generated"]
allowed_project_root_files = ["product_spec.toml", "implementation_config.toml"]
allowed_project_doc_suffixes = [".md"]

[validation.level_allowed_prefixes]
L0 = ["specs/"]
L1 = ["specs/"]
L2 = ["framework/"]
L3 = ["mapping/"]

[portability]
text_scan_roots = ["README.md", "CONTRIBUTING.md", "AGENTS.md", "docs", ".github/ISSUE_TEMPLATE"]
text_scan_extensions = [".md", ".yml", ".yaml"]
excluded_roots = ["docs/hierarchy"]
issue_template_files = [".github/ISSUE_TEMPLATE/config.yml"]
